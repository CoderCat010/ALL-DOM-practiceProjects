<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    
</head>
<body class="flex justify-center bg-fuchsia-200">
    <!-- parent container -->
    <section class="mt-20 w-[800px]">
        <!-- 
        add note 
        -->
         <div class="w-[400px] mx-auto">
            <!-- add note button -->
             <div class="flex justify-end">
                <button onclick="addNote()" class="flex justify-center items-center gap-x-1 bg-fuchsia-500 text-[#ffffff] text-base font-medium  py-2 px-3 rounded-full shadow-2xl cursor-pointer">Add Note
                    <!-- icon -->
                    <svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                </button>
             </div>

             <!-- note input -->
            <div class="relative">
                <textarea id="type-note" class="bg-white focus:outline-none w-full h-24 py-4 pl-4 pr-10 mt-4 rounded-xl shadow-sm resize-none" placeholder="Type Here..."></textarea>

                <!-- importent note checkox -->
                <svg id="importent-notes-checkbox" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 absolute top-[28%] right-4 cursor-pointer">
                    <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
                </svg>
            </div>
         </div>

         <!-- 
         main container
          -->
          <div class="mt-10">
            <div class="flex justify-between items-center">
                <!-- search notes & importent notes button -->
                <div class="flex justify-center items-center gap-x-5">
                    <div class="relative bottom-[10px]">
                        <input id="search-box" class="border-b border-b-fuchsia-500 focus:border-b-2 focus:outline-none w-[200px] p-1 mt-4 resize-none" placeholder="Search Note" type="search">
                    </div>

                    <!--all & importent notes -->
                    <button id="all-notes" class="hover:text-[#000000b0] flex justify-center items-center gap-x-1 cursor-pointer ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
                        </svg>
                        All Notes
                    </button>

                    <button id="importent-notes" class="hover:text-[#000000b0] flex justify-center items-center gap-x-1 cursor-pointer ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3 1.5 1.5 3-3.75" />
                        </svg>
                        Importent Notes
                    </button>
                </div>

                <!-- count notes -->
                <div>
                    <button>Total Notes: <span id="total-notes">1</span>
                    </button>
                </div>
            </div>

            <!-- notes container -->
             <ul id="notes-list-container" class="mt-5 w-[400px]">
                <!-- list will added from js file dynamically -->
                 <li class="bg-white py-3 px-4 mb-4 flex justify-between items-center gap-x-5 rounded-sm shadow-md group">
                    <span class="w-[350px] break-all">Lorem ipsum dolor sit amet consectetur adipisicing elit.</span>

                    <!-- icon -->
                    <svg onclick="deleteNote(this)" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 cursor-pointer hidden group-hover:block">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                    </svg>
                 </li>
             </ul>
          </div>
    </section>


    <!-- js file -->
     <script src="./script.js"></script>
</body>
</html>
