<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    
</head>
<body class="flex justify-center bg-fuchsia-200">
    <!-- parent container -->
    <section class="mt-20 w-[800px]">
        <!-- 
        add note 
        -->
         <div class="w-[400px] mx-auto">
            <!-- add note button -->
             <div class="flex justify-end">
                <button id="add-btn" class="flex justify-center items-center gap-x-1 bg-fuchsia-500 text-[#ffffff] text-base font-medium  py-2 px-3 rounded-full shadow-2xl cursor-pointer">Add Note
                    <!-- icon -->
                    <svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                </button>
             </div>

             <!-- note input -->
            <div class="relative">
                <textarea id="type-note" class="bg-white focus:outline-none w-full h-24 py-4 pl-4 pr-10 mt-4 rounded-xl shadow-sm resize-none" placeholder="Type Here..."></textarea>

                <!-- importent note checkox -->
                <svg id="importent-notes-checkbox" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 absolute top-[28%] right-4 cursor-pointer hover:text-[#000000bb] duration-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.125 2.25h-4.5c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-9M10.125 2.25h.375a9 9 0 0 1 9 9v.375M10.125 2.25A3.375 3.375 0 0 1 13.5 5.625v1.5c0 .621.504 1.125 1.125 1.125h1.5a3.375 3.375 0 0 1 3.375 3.375M9 15l2.25 2.25L15 12" />
                </svg>
            </div>
         </div>

         <!-- 
         main container
          -->
          <div class="mt-10">
            <div class="flex justify-between items-center">
                <!-- search notes & importent notes button -->
                <div class="flex justify-center items-center gap-x-5">
                    <div class="relative bottom-[10px]">
                        <input id="search-box" class="border-b border-b-fuchsia-500 focus:border-b-2 focus:outline-none w-[200px] p-1 mt-4 resize-none" placeholder="Search Note" type="search">
                    </div>

                    <!-- importent notes -->
                    <button id="importent-notes" class="hover:text-[#000000b0] flex justify-center items-center gap-x-1 cursor-pointer ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
                        </svg>
                        Importent Notes
                    </button>
                </div>

                <!-- count notes -->
                <div>
                    <button>Total Notes: <span id="total-notes">1</span>
                    </button>
                </div>
            </div>

            <!-- notes container -->
             <ul id="notes-list-container" class="mt-5 w-[400px]">
                <!-- list will added from js file dynamically -->
                 <li class="bg-white flex justify-between items-center text-wrap py-3 px-3 rounded-sm shadow-sm group mb-4">
                    <span>Lorem ipsum dolor sit amet.</span>
                    <!-- icon -->
                    <svg id="deleteBtn" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 cursor-pointer invisible group-hover:visible">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                    </svg>
                 </li>
             </ul>
          </div>
    </section>


    <!-- js file -->
     <script src="./script.js"></script>
</body>
</html>
