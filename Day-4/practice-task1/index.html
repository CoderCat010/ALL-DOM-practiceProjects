<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css link -->
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-[1200px] mx-auto my-[50px]">

    <!-- movie genre filter container -->
     <div id="genre-filter-container" class="flex justify-center items-center gap-x-10">
        <button data-genre="${genre}" class="bg-cyan-50 py-2 px-3 font-medium rounded-full shadow-sm genre-btn">All</button>
        <!-- data will be added dynamically -->
     </div>

     <!-- main container -->
     <div class="flex justify-evenly items-center mt-[50px]">
        <!-- Movie Stats Container -->
        <div class="bg-cyan-50 w-[200px] h-[300px] rounded-tl-[50%] rounded-bl-[50%] rounded-tr-lg rounded-br-lg shadow-sm flex flex-col pl-10 justify-center">
            <h1 class="font-semibold text-xl border-[#000] text-center mb-8">History</h1>
            <button id="total-counter" class="font-semibold text-xl py-2 border-t border-[#00000013] text-left cursor-default">Total: 0</button>
            <button id="watched-counter" class="font-semibold text-xl py-2 border-t border-b border-[#00000013] text-left cursor-default">Watched: 0</button>
        </div>

        <!-- all movies collection -->
        <div class="grid grid-cols-3 gap-10" id="all-movies-collection">
            <!-- data will be added dynamically -->
        </div>
    </div>
    

    <!-- js link -->
     <script src="./script.js"></script>
</body>
</html>
