<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Manager</title>

    <!-- css link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-[1000px] mx-auto my-[50px] bg-slate-50 px-5">

    <!-- title -->
    <h1 class="text-3xl font-bold text-center mb-8 text-slate-800">Employee Manager</h1>

    <!-- search input -->
    <div class="flex justify-center mb-6">
        <input id="search-input" type="text" placeholder="Search by name..." class="border border-slate-300 rounded-md py-2 px-4 w-[300px] shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
    </div>

    <!-- department filter container -->
    <div id="department-filter-container" class="flex justify-center items-center gap-x-3 mb-8">
        <button class="bg-indigo-100 text-indigo-700 py-2 px-4 font-medium rounded-full shadow-sm">All</button>
        <button class="bg-white text-slate-600 py-2 px-4 font-medium rounded-full shadow-sm border border-slate-200">IT</button>
        <button class="bg-white text-slate-600 py-2 px-4 font-medium rounded-full shadow-sm border border-slate-200">HR</button>
        <button class="bg-white text-slate-600 py-2 px-4 font-medium rounded-full shadow-sm border border-slate-200">Finance</button>
    </div>

    <!-- employees container -->
    <div id="employees-container" class="grid grid-cols-2 gap-6 mb-8">
        <!-- data will be added dynamically, dummy card shown below for design -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-semibold text-slate-800">Rahim</h2>
                <p class="text-sm text-slate-500">IT &middot; ৳40,000</p>
            </div>
            <button class="bg-emerald-100 text-emerald-700 text-sm font-medium py-1.5 px-3 rounded-md">Active</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-semibold text-slate-800">Jamal</h2>
                <p class="text-sm text-slate-500">IT &middot; ৳50,000</p>
            </div>
            <button class="bg-rose-100 text-rose-700 text-sm font-medium py-1.5 px-3 rounded-md">Inactive</button>
        </div>
    </div>



    <!-- js link -->
    <script src="./script.js"></script>
</body>
</html>
