<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Manager</title>

    <!-- css link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-[1000px] mx-auto my-[50px] bg-slate-50 px-20">

    <!-- title -->
    <h1 class="text-3xl font-bold text-center mt-20 mb-8 text-slate-800">Employee Manager</h1>

    <!-- search input -->
    <div class="flex justify-center mb-6">
        <input id="search-input" type="text" placeholder="Search by name..." class="border border-slate-300 rounded-md py-2 px-4 w-[300px] shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
    </div>

    <!-- department filter container -->
    <div id="department-filter-container" class="flex justify-center items-center gap-x-3 mb-8"></div>

    <!-- employees container -->
    <div id="employees-container" class="grid grid-cols-2 gap-7 mb-10"></div>

    <!-- total salary -->
    <p id="total-salary" class="text-center text-xl font-semibold border-t border-slate-300 pt-10 text-slate-800">Total Salary: $0</p>
    

    <!-- js link -->
    <script src="./script.js"></script>
</body>
</html>
