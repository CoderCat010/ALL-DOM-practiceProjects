<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
 
  <!-- main container -->
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <!-- title -->
    <h1 class="text-2xl font-bold text-center mb-6">Vote for your favorite!</h1>

    <!-- Votes board -->
    <div id="all-candidates" class="space-y-4 all-candidates">
 
      <!-- Candidate 1 -->
      <div class="candidate-card flex items-center justify-between bg-gray-50 p-4 rounded-xl shadow">
        <!-- title container -->
        <div class="flex items-center gap-2">
          <span class="font-semibold text-lg">Option A</span>
          <span class="crown-winner hidden">👑</span>
        </div>

        <!-- vote counter & vote button -->
        <div class="flex items-center gap-4">
          <span class="vote-counterBtn font-bold text-blue-600">
            0</span>
          <button class="vote-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">Vote</button>
        </div>
      </div>
 
      <!-- Candidate 2 -->
      <div class="candidate-card flex items-center justify-between bg-gray-50 p-4 rounded-xl shadow">
        <!-- title container -->
        <div class="flex items-center gap-2">
          <span class="font-semibold text-lg">Option B</span>
          <span class="crown-winner hidden">👑</span>
        </div>

        <!-- vote counter & vote button -->
        <div class="flex items-center gap-4">
          <span class="vote-counterBtn font-bold text-blue-600">
            0</span>
          <button class="vote-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">Vote</button>
        </div>
      </div>
 
      <!-- Candidate 3 -->
      <div class="candidate-card flex items-center justify-between bg-gray-50 p-4 rounded-xl shadow">
        <!-- title container -->
        <div class="flex items-center gap-2">
          <span class="font-semibold text-lg">Option C</span>
          <span class="crown-winner hidden">👑</span>
        </div>

        <!-- vote counter & vote button -->
        <div class="flex items-center gap-4">
          <span class="vote-counterBtn font-bold text-blue-600">
            0</span>
          <button class="vote-btn bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">Vote</button>
        </div>
      </div>
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
