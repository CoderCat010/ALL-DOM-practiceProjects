<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <!-- css link -->
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-200 min-h-screen flex items-center justify-center">

    <!-- main container -->
    <div class="py-5 px-5 w-[400px] space-y-5">
        <!-- 
        progression tracker1 
        -->
        <div class="flex justify-between items-center border bg-[#2C2C2A] p-3 rounded-[10px]">
            <!-- title -->
            <div>
                <h2 class="text-[#fff] font-semibold">Drink Water</h2>
                <p class="text-[#d3d3d3]">3 days</p>
            </div>

            <!-- progress button -->
            <div>
                <button class="py-1 px-2 shadow-sm border border-[#ffffff1a] rounded-md text-[#fff] font-medium text-[14px]">Mark today done</button>
            </div>
        </div>

        <!-- 
        progression tracker2
        -->
        <div class="flex justify-between items-center border bg-[#2C2C2A] p-3 rounded-[10px]">
            <!-- title -->
            <div>
                <h2 class="text-[#fff] font-semibold">Exercise</h2>
                <p class="text-[#d3d3d3]">7 days</p>
            </div>

            <!-- progress button -->
            <div>
                <button class="py-1 px-2 shadow-sm border border-[#ffffff1a] rounded-md text-[#fff] font-medium text-[14px]">Mark today done</button>
            </div>
        </div>

        <!-- 
        progression tracker3 
        -->
        <div class="flex justify-between items-center border text-[#00e400a8] bg-[#074600] p-3 rounded-[10px]">
            <!-- title -->
            <div>
                <h2 class="font-semibold">Read Book</h2>
                <p class="">5 days</p>
            </div>

            <!-- progress button -->
            <div>
                <button class="py-1 px-2 shadow-sm border border-[#ffffff1a] rounded-md text-[#ffffff44] font-medium text-[14px]">Completed!</button>
            </div>
        </div>



             
    </div>



    <!-- js file -->
     <script src="./script.js"></script>
</body>
</html>
